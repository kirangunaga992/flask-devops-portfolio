<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard | Rohan Gunaga</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #00ff88; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; padding: 50px; }
        .chart-box { background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid var(--primary); box-shadow: 0 0 20px rgba(0, 255, 136, 0.2); transition: transform 0.3s; }
        .chart-box:hover { transform: scale(1.02); }
        h1 { color: var(--primary); margin-bottom: 30px; }
        .logout { margin-top: 30px; color: var(--text); text-decoration: none; border-bottom: 1px solid var(--primary); }
    </style>
</head>
<body>
    <h1>System Analysis Dashboard</h1>
    
    <div class="chart-box">
        <canvas id="skillsChart" width="400" height="400"></canvas>
    </div>

    <a href="/" class="logout">← Back to Portfolio</a>

    <script>
        const ctx = document.getElementById('skillsChart').getContext('2d');
        const skillsChart = new Chart(ctx, {
            type: 'pie',
            data: {
                labels: ['DevOps', 'Cybersecurity', 'Backend', 'Frontend'],
                datasets: [{
                    label: 'Skill Distribution',
                    data: [40, 30, 20, 10], // Percentages
                    backgroundColor: ['#00ff88', '#3b82f6', '#f59e0b', '#ef4444'],
                    borderColor: '#1e293b',
                    borderWidth: 2,
                    hoverOffset: 30 // This makes the slice "pop" on hover
                }]
            },
            options: {
                plugins: {
                    legend: { labels: { color: 'white', font: { size: 14 } } }
                }
            }
        });
    </script>
</body>
</html>
