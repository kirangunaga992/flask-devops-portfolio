<!DOCTYPE html>
<html>
<head>
    <title>Admin Login | Rohan Portfolio</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: #1e293b; padding: 40px; border-radius: 12px; border: 1px solid #00ff88; text-align: center; }
        input { display: block; width: 100%; margin: 10px 0; padding: 10px; border-radius: 5px; border: none; }
        button { background: #00ff88; color: black; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 110%; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>Security Login</h2>
        <form action="/login" method="post">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Access System</button>
        </form>
        <p style="font-size: 0.8rem; color: #64748b; margin-top: 20px;">Testing Authentication Flow</p>
    </div>
</body>
</html>
